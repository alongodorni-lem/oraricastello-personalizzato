<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Orari Castello personalizzato</title>
  <style>
    body { font-family: Segoe UI, Arial, sans-serif; margin: 0; background:#f4f7ff; color:#1a2452; }
    main { max-width: 1000px; margin: 0 auto; padding: 20px; }
    .card { background:#fff; border:1px solid #d7dff1; border-radius:14px; padding:16px; margin-bottom:14px; }
    h1 { margin: 0 0 8px; color:#1b4da1; }
    .grid { display:grid; grid-template-columns: repeat(auto-fit,minmax(220px,1fr)); gap:10px; }
    label { font-weight:600; display:block; margin-bottom:4px; }
    input, select, textarea { width:100%; padding:8px; border:1px solid #c6d2ee; border-radius:8px; font:inherit; }
    .chips { display:flex; flex-wrap:wrap; gap:8px; }
    .chip { display:flex; gap:6px; align-items:center; border:1px solid #d5dcf3; border-radius:999px; padding:6px 10px; background:#f9fbff; }
    button { background:#1b4da1; color:#fff; border:0; border-radius:10px; padding:10px 14px; font-weight:700; cursor:pointer; }
    button[disabled] { opacity:0.6; cursor:wait; }
    .muted { color:#556080; font-size:0.92rem; }
    .step { border-left:4px solid #7d3cc7; padding-left:10px; margin:8px 0; }
    .status { margin-top:10px; font-size:0.9rem; color:#2d3b64; }
    .scroll-nav {
      position: fixed;
      right: 12px;
      bottom: 14px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .scroll-nav button {
      width: 42px;
      height: 42px;
      padding: 0;
      border-radius: 999px;
      border: 1px solid #b9c8ec;
      background: rgba(255,255,255,0.95);
      color: #1b4da1;
      font-size: 20px;
      font-weight: 700;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 10px rgba(17, 24, 39, 0.15);
      cursor: pointer;
    }
    .scroll-nav button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .field-error {
      border-color: #b91c1c !important;
      box-shadow: 0 0 0 1px rgba(185, 28, 28, 0.15);
    }
    .field-error-text {
      color: #b91c1c;
      font-size: 0.82rem;
      margin-top: 4px;
    }
    @media (max-width: 768px) {
      .chips {
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
      }
      .chip {
        width: 100%;
        border: 0;
        background: transparent;
        border-radius: 0;
        padding: 0;
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 600;
        margin: 0;
      }
      .chip input[type="checkbox"] {
        margin: 0;
        width: 18px;
        height: 18px;
        flex: 0 0 18px;
      }
      #submitBtn {
        width: 100%;
        padding: 14px 18px;
        font-size: 1.05rem;
      }
      .scroll-nav button {
        width: 46px;
        height: 46px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>Orari Castello personalizzato</h1>
      <p class="muted">Compila i dati, guarda le attività previste e scarica subito il tuo orario personalizzato.</p>
    </section>

    <section class="card">
      <form id="planner-form">
        <div class="grid">
          <div>
            <label for="email">Email</label>
            <input id="email" type="email" required placeholder="nome@email.it">
          </div>
          <div>
            <label for="visitDate">Data</label>
            <select id="visitDate" required>
              <option value="2026-04-19">19 aprile</option>
              <option value="2026-04-25">25 aprile</option>
              <option value="2026-04-26">26 aprile</option>
              <option value="2026-05-01">1 maggio</option>
            </select>
          </div>
          <div>
            <label for="arrivalTime">Orario previsto di arrivo</label>
            <select id="arrivalTime" required>
              <option value="09:30">09:30</option>
              <option value="10:00">10:00</option>
              <option value="10:30">10:30</option>
              <option value="11:00">11:00</option>
              <option value="11:30">11:30</option>
              <option value="12:00">12:00</option>
              <option value="12:30">12:30</option>
              <option value="13:00">13:00</option>
              <option value="13:30">13:30</option>
              <option value="14:00">14:00</option>
              <option value="14:30">14:30</option>
              <option value="15:00">15:00</option>
            </select>
          </div>
          <div>
            <label for="stayDuration">Quanto tempo vuoi fermarti?</label>
            <select id="stayDuration" required>
              <option value="at_least_2_5h">2,5 ore</option>
              <option value="between_2_5h_4h">Da 2,5 a 4 ore</option>
              <option value="over_4h">Oltre 4 ore</option>
            </select>
          </div>
          <div>
            <label for="hasChildren">Ci sono bambini?</label>
            <select id="hasChildren">
              <option value="yes">Si</option>
              <option value="no">No</option>
            </select>
          </div>
          <div>
            <label for="childrenAges">Età bambini (es. 4,7)</label>
            <input id="childrenAges" type="text" placeholder="obbligatorio se ci sono bambini">
          </div>
        </div>

        <div style="margin-top:12px;">
          <label>Interessi principali</label>
          <div class="chips">
            <label class="chip"><input type="checkbox" value="Principesse">Principesse</label>
            <label class="chip"><input type="checkbox" value="Maghi">Maghi</label>
            <label class="chip"><input type="checkbox" value="Huntrix">Huntrix</label>
            <label class="chip"><input type="checkbox" value="Benessere">Benessere</label>
            <label class="chip"><input type="checkbox" value="Pic-nic">Pic-nic</label>
            <label class="chip"><input type="checkbox" value="Punti ristoro">Punti ristoro</label>
          </div>
        </div>

        <div style="margin-top:12px;">
          <label for="freeText">Cosa vi piace di piu? (testo libero)</label>
          <textarea id="freeText" rows="3"></textarea>
        </div>

        <div style="margin-top:12px;">
          <button id="submitBtn" type="submit">Genera orario personalizzato</button>
        </div>
      </form>
      <p class="status" id="status"></p>
    </section>

    <section class="card">
      <h2>Risultato</h2>
      <div id="result" class="muted">Nessun itinerario generato.</div>
    </section>
  </main>

  <div class="scroll-nav" aria-label="Scorri pagina">
    <button id="scrollUpBtn" type="button" aria-label="Vai su">↑</button>
    <button id="scrollDownBtn" type="button" aria-label="Vai giù">↓</button>
  </div>

  <script src="./app.js"></script>
</body>
</html>
